<h2 mat-dialog-title>{{ mode === 'add' ? 'Add product' : 'Edit product' }}</h2>

<div mat-dialog-content style="display: grid; gap: 12px; padding-top: 8px">
  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
    <input matInput [formControl]="form.controls.name" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Price</mat-label>
    <input matInput type="number" [formControl]="form.controls.price" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Category</mat-label>
    <input matInput [formControl]="form.controls.category" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Stock</mat-label>
    <input matInput type="number" [formControl]="form.controls.stock" />
  </mat-form-field>

  <mat-slide-toggle [formControl]="form.controls.isActive">Active</mat-slide-toggle>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">
    {{ mode === 'add' ? 'Add' : 'Save' }}
  </button>
</div>
